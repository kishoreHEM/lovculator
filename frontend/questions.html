<body class="app-layout answers-page">
    <div id="global-header"></div>

    <div class="app-container">
        <main class="main-content-area">
            <div id="global-mobile-menu"></div>
            
            

            <section class="questions-shell" aria-labelledby="questionsPageTitle">
                <header class="questions-hero">
                    <div class="questions-hero-copy">
                        <span class="questions-hero-kicker">Community Q&amp;A</span>
                        <h1 id="questionsPageTitle" class="page-title">Questions for you</h1>
                        <p class="questions-hero-subtitle">Browse trending relationship questions, discover unanswered conversations, and share thoughtful advice.</p>
                    </div>
                </header>

                <div class="filter-container questions-toolbar" role="region" aria-label="Question filters">
                    <div class="search-box toolbar-search">
                        <span class="toolbar-search-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="questionSearchInput" class="comment-input toolbar-search-input"
                               placeholder="Search questions, topics, and advice..." aria-label="Search questions">
                    </div>

                    <div class="toolbar-selects">
                        <label class="toolbar-select-group">
                            <span class="toolbar-label">Category</span>
                            <select id="categorySelect" class="filter-btn toolbar-select">
                                <option value="all">All Categories</option>
                                <option value="love">Love</option>
                                <option value="dating">Dating</option>
                                <option value="marriage">Marriage</option>
                                <option value="friendship">Friendship</option>
                                <option value="communication">Communication</option>
                                <option value="breakups">Breakups</option>
                            </select>
                        </label>

                        <label class="toolbar-select-group">
                            <span class="toolbar-label">Sort</span>
                            <select id="sortSelect" class="filter-btn toolbar-select">
                                <option value="newest">Newest First</option>
                                <option value="popular">Most Popular</option>
                                <option value="unanswered">Unanswered</option>
                            </select>
                        </label>
                    </div>

                    <button id="applyFilterBtn" class="answer-btn toolbar-filter-btn">
                        Apply Filters
                    </button>
                </div>
            </section>

            <section class="questions-section">
                <div id="storiesContainer">
                    <div class="loading-stories">
                        <div class="loading-spinner"></div>
                        <p>Loading questions...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/messages.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/pwa-register.js"></script>
    <script src="/js/global-header.js"></script>
    <script src="/js/global-mobile-menu.js"></script>
    <script src="/js/social-features.js"></script>
    <script src="/js/questions-feed.js"></script>
</body>
</html>
